{{- $this := .Scratch.Get "this" -}}
{{- if not $this -}}
  {{- .Scratch.Set "this" (dict "_init" "") -}}
  {{- $this = .Scratch.Get "this" -}}
{{- end -}}
{{- $script := $this.script | default slice -}}
{{- $script = $script | append (slice .Data) -}}
{{- .Scratch.SetInMap "this" "script" $script -}}
